name: Bevy Console Audit
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Environment (temporary)
        run: |
          set -euxo pipefail
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"
          git rev-parse HEAD
          pwd
          ls -la
          rustc --version
          cargo --version
          echo "--- engine.rs std::fs lines ---"
          grep -n "std::fs" src/engine.rs || true
          echo "--- main.rs std::process lines ---"
          grep -n "std::process" src/main.rs || true

      - name: Run Audit
        run: cargo clean && cargo run --release -- --target switch --scan-source

      - name: Upload Audit Output (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output
          path: audit-output.log