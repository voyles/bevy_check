name: Bevy Console Audit
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Environment (temporary)
        run: |
          set -euxo pipefail
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"
          pwd
          ls -la
          rustc --version
          cargo --version

      - name: Run Audit
        # We combine build and run here. 
        # 'cargo run' handles the compilation automatically.
        run: cargo run --release --locked -- --target switch --scan-source